<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamentos de Bordados</title>

    <link rel="shortcut icon" href="./src/img/favicon.webp" type="image/x-icon">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./src/estilos/reset.css">    
    <link rel="stylesheet" href="./src/estilos/global.css">
    <link rel="stylesheet" href="./src/estilos/cores.css">
    <link rel="stylesheet" href="./src/estilos/lista-orcamentos.css">
    <link rel="stylesheet" href="./src/estilos/modal.css">
    <link rel="stylesheet" href="./src/estilos/responsividade.css">

</head>
<body>

    <header class="cabecalho-principal u-tema-claro-padrao">
        <img src="./src/img/logo-dtex.webp" alt="Logo Dtex">
        <img src="./src/img/edit-icon.svg" alt="editar variaveis" class="cabecalho-principal__btn-editar-mobile u-tema-medio-padrao">
    </header>
   
    <main class="layout-app">
        
        <div class="painel-variaveis">
        </div>
        
        <div class="barra-acoes u-tema-claro-padrao">
            <input type="text" class="barra-acoes__campo-pesquisa u-tema-claro-padrao" placeholder="Pesquisar orçamento">
            <input type="button" value="Novo" id="btn-novo-orcamento" data-modal="dialog-global" class="barra-acoes__btn-novo u-tema-medio-padrao">  
        </div>        

        <section  class="secao-lista u-tema-claro-padrao">

            <section class="lista-orcamentos">
            </section>
            
            <h6 class="secao-lista__btn-carregar-mais" style="display: none;">
                Carregar Mais
            </h6>

        </section>
            
    </main>
    
    <footer class="rodape-principal u-tema-claro-padrao">
        <h5>Leo de Vanda produções &copy;</h5>
    </footer>


    <dialog id="dialog-global" class="modal u-tema-claro-padrao">
        
    </dialog>

    <script defer type="module" src="./src/js/app.js"></script>

</body>
</html>
